<title>PRACTICE 1 ‚Äî Flowcharts</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020817;--sidebar:#07111f;--card:#0a1628;
  --border:#1a2e4a;--text:#e2e8f0;--muted:#64748b;--sub:#94a3b8;
}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;display:flex;min-height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{
  width:230px;flex-shrink:0;background:var(--sidebar);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  overflow-y:auto;height:100vh;position:sticky;top:0;
}
.sidebar-header{padding:22px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-header .label{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
.sidebar-header .title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-top:5px;color:#f1f5f9}
.ex-btn{
  display:block;width:100%;text-align:left;
  padding:11px 18px;background:transparent;border:none;
  border-left:3px solid transparent;
  color:var(--sub);cursor:pointer;font-size:11.5px;
  font-family:'JetBrains Mono',monospace;font-weight:400;
  transition:all .15s;line-height:1.4;
}
.ex-btn:hover{background:#0f1e35;color:var(--text)}
.ex-btn.active{font-weight:700}
.ex-num{opacity:.45;margin-right:6px}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{
  padding:20px 30px;border-bottom:1px solid var(--border);
  background:var(--sidebar);display:flex;align-items:center;gap:14px;
  flex-shrink:0;
}
.ex-badge{
  width:38px;height:38px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#fff;flex-shrink:0;
}
.ex-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#f1f5f9}
.ex-desc{font-size:11px;color:var(--muted);margin-top:3px}

#canvas-wrap{flex:1;overflow:auto;padding:30px}
.svg-card{
  display:inline-block;background:var(--card);
  border-radius:12px;padding:24px;
  border:1px solid var(--border);
  box-shadow:0 0 60px rgba(0,0,0,.4);
}

/* LEGEND */
#legend{
  flex-shrink:0;padding:14px 30px;border-top:1px solid var(--border);
  background:var(--sidebar);display:flex;gap:28px;flex-wrap:wrap;align-items:center;
}
.leg-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#1e3050;border-radius:4px}
</style>
</head>

let current=0;

function nodeH(t){return t==="T"?TRX*2:t==="D"?DH:PH}
function nodeCenter(n){return{x:n.x+NW/2, y:n.y+nodeH(n.t)/2}}

function svgElem(tag,attrs){
  const el=document.createElementNS("http://www.w3.org/2000/svg",tag);
  for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);
  return el;
}

function makeText(svg,lines,cx,cy,color){
  const g=svgElem("g",{});
  const n=lines.length;
  lines.forEach((line,i)=>{
    const t=svgElem("text",{
      x:cx, y:cy+(i-(n-1)/2)*15,
      "text-anchor":"middle","dominant-baseline":"middle",
      "font-size":"11.5","font-weight":"600","fill":color||"#fff",
      "font-family":"JetBrains Mono, monospace"
    });
    t.textContent=line;
    g.appendChild(t);
  });
  svg.appendChild(g);
}

function renderNode(svg,node,color){
  const{x,y,t,label}=node;
  const lines=label.split("  ");
  if(t==="T"){
    svg.appendChild(svgElem("rect",{x,y,width:NW,height:TRX*2,rx:TRX,fill:color,stroke:"#fff","stroke-width":"2"}));
    makeText(svg,lines,x+NW/2,y+TRX,"#fff");
  }else if(t==="P"){
    svg.appendChild(svgElem("rect",{x,y,width:NW,height:PH,rx:6,fill:"#1e293b",stroke:color,"stroke-width":"2"}));
    makeText(svg,lines,x+NW/2,y+PH/2,"#fff");
  }else if(t==="I"){
    const sk=10;
    const pts=`${x+sk},${y} ${x+NW},${y} ${x+NW-sk},${y+IH} ${x},${y+IH}`;
    svg.appendChild(svgElem("polygon",{points:pts,fill:"#0f172a",stroke:color,"stroke-width":"2"}));
    makeText(svg,lines,x+NW/2,y+IH/2,"#fff");
  }else if(t==="D"){
    const hw=NW/2,hh=DH/2,cx2=x+hw,cy2=y+hh;
    const pts=`${cx2},${y} ${x+NW},${cy2} ${cx2},${y+DH} ${x},${cy2}`;
    svg.appendChild(svgElem("polygon",{points:pts,fill:"#1e293b",stroke:color,"stroke-width":"2"}));
    makeText(svg,lines,cx2,cy2,"#fff");
  }
}

function renderEdge(svg,edge,nodeMap,color,exId,idx){
  const fn=nodeMap[edge.f], tn=nodeMap[edge.t];
  if(!fn||!tn)return;
  const fc=nodeCenter(fn), tc=nodeCenter(tn);
  const fh=nodeH(fn.t), th=nodeH(tn.t);

  const markId=`arr-${exId}-${idx}`;
  const defs=svgElem("defs",{});
  const marker=svgElem("marker",{id:markId,markerWidth:"8",markerHeight:"8",refX:"6",refY:"3",orient:"auto"});
  const mp=svgElem("path",{d:"M0,0 L0,6 L8,3 z",fill:color});
  marker.appendChild(mp);defs.appendChild(marker);svg.appendChild(defs);

  let d="", lx=0, ly=0;
  const s=edge.s||"";

  if(s==="loop-r"){
    // right side loop back up
    const fx=fn.x+NW, fy=fc.y;
    const tx=tn.x+NW, ty=tc.y;
    const rx=Math.max(fx,tx)+35;
    d=`M ${fx} ${fy} L ${rx} ${fy} L ${rx} ${ty} L ${tx} ${ty}`;
    lx=rx+4; ly=(fy+ty)/2;
  }else if(s==="loop-l"){
    // left side loop back up
    const fx=fn.x, fy=fc.y;
    const tx=tn.x, ty=tc.y;
    const lxp=Math.min(fx,tx)-42;
    d=`M ${fx} ${fy} L ${lxp} ${fy} L ${lxp} ${ty} L ${tx} ${ty}`;
    lx=lxp-28; ly=(fy+ty)/2;
  }else if(s==="right"){
    const fx=fn.x+NW, fy=fc.y;
    const tx2=tn.x, ty2=tc.y;
    if(Math.abs(fy-ty2)<8) d=`M ${fx} ${fy} L ${tx2} ${ty2}`;
    else d=`M ${fx} ${fy} L ${tx2} ${fy} L ${tx2} ${ty2}`;
    lx=fx+8; ly=fy-10;
  }else if(s==="left"){
    const fx=fn.x, fy=fc.y;
    const tx2=tn.x+NW, ty2=tc.y;
    d=`M ${fx} ${fy} L ${tx2} ${fy} L ${tx2} ${ty2}`;
    lx=fx-30; ly=fy-10;
  }else if(s==="bl"){
    // bottom of from ‚Üí left to top of to
    const fx=fc.x, fy=fn.y+fh;
    const tx2=tc.x, ty2=tn.y;
    d=`M ${fx} ${fy} L ${fx} ${ty2} L ${tx2} ${ty2}`;
    lx=fx+4; ly=fy+(ty2-fy)/2;
  }else{
    // straight down
    const fy=fn.y+fh, ty2=tn.y;
    d=`M ${fc.x} ${fy} L ${tc.x} ${ty2}`;
    lx=fc.x+6; ly=(fy+ty2)/2;
  }

  svg.appendChild(svgElem("path",{d,fill:"none",stroke:color,"stroke-width":"2","marker-end":`url(#${markId})`}));
  if(edge.label){
    const lt=svgElem("text",{x:lx,y:ly,"font-size":"11","fill":color,"font-weight":"700","font-family":"JetBrains Mono,monospace"});
    lt.textContent=edge.label;
    svg.appendChild(lt);
  }
}

function renderExercise(idx){
  const ex=exercises[idx];
  const color=ex.color;
  const svg=document.getElementById("fc-svg");
  while(svg.firstChild)svg.removeChild(svg.firstChild);

  const nodeMap=Object.fromEntries(ex.nodes.map(n=>[n.id,n]));
  const maxY=Math.max(...ex.nodes.map(n=>n.y+nodeH(n.t)+60));
  const maxX=Math.max(...ex.nodes.map(n=>n.x+NW+80));
  const W=Math.max(620,maxX+60), H=maxY+40;
  svg.setAttribute("width",W);svg.setAttribute("height",H);
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);

  ex.edges.forEach((e,i)=>renderEdge(svg,e,nodeMap,color,ex.id,i));
  ex.nodes.forEach(n=>renderNode(svg,n,color));

  // Update header
  document.getElementById("hdr-badge").style.background=color;
  document.getElementById("hdr-badge").textContent=ex.id;
  document.getElementById("hdr-title").textContent=ex.title;
  document.getElementById("hdr-desc").textContent=ex.desc;

  // Update legend colors
  ["leg-terminal","leg-proc","leg-io","leg-dec"].forEach(id=>{
    const el=document.getElementById(id);
    if(el){
      if(id==="leg-terminal") el.setAttribute("fill",color);
      else el.setAttribute("stroke",color);
    }
  });

  // Update nav
  document.querySelectorAll(".ex-btn").forEach((b,i)=>{
    b.classList.toggle("active",i===idx);
    b.style.borderLeftColor=i===idx?exercises[i].color:"transparent";
    b.style.color=i===idx?exercises[i].color:"#94a3b8";
    b.style.background=i===idx?exercises[i].color+"22":"transparent";
  });
  current=idx;
}

// Build nav
const nav=document.getElementById("nav-list");
exercises.forEach((ex,i)=>{
  const btn=document.createElement("button");
  btn.className="ex-btn";
  btn.innerHTML=`<span class="ex-num">Ex ${ex.id}</span>${ex.title}`;
  btn.onclick=()=>renderExercise(i);
  nav.appendChild(btn);
});

renderExercise(0);
</script>
</body>
</html>
